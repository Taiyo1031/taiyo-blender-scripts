<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blend Reference Graph</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <header>
    <h1>Blend Reference Graph</h1>
    <div class="meta" id="meta"></div>
    <button id="github" type="button">GitHub</button>
    <button id="export-json" type="button">Export JSON</button>
    <button id="swap-panels" type="button">Swap Bars</button>
    <button id="zoom-out" type="button">Zoom Out</button>
    <button id="zoom-in" type="button">Zoom In</button>
    <button id="reload">Reload Data</button>
    <button id="fit">Fit View</button>
  </header>
  <main>
    <aside id="left-panel">
      <div class="search-row">
        <input id="search" type="search" placeholder="Search nodes">
        <button id="search-prev" type="button" aria-label="Previous search result">Prev</button>
        <button id="search-next" type="button" aria-label="Next search result">Next</button>
      </div>
      <div id="search-status" class="search-status"></div>
      <section>
        <h2>Node Types</h2>
        <div id="legend"></div>
      </section>
    </aside>
    <section id="graph-wrap">
      <svg id="graph" aria-label="Reference graph"></svg>
      <div id="selection-box"></div>
      <div class="graph-bottom-help">
        <span id="usage-hint">Mac trackpad: two-finger scroll pans. Pinch or Cmd-scroll zooms. Search selects and focuses matches.</span>
        <span id="shortcuts">Keys: / search / Enter next / Shift+Enter previous / arrows or HJKL pan / +/- zoom / 0 or F fit / B box select / Esc cancel</span>
      </div>
    </section>
    <aside id="details">
      <h2>Details</h2>
      <p>Select a node.</p>
    </aside>
  </main>
  <script src="graph_data.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
